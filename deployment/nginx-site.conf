# nginx site config for the Rust WikiWho rewrite on a Wikimedia Cloud VPS.
#
# Drop into /etc/nginx/sites-available/wikiwho-rs and symlink from
# sites-enabled/. The Horizon web proxy (wikiwho-rs.wmcloud.org or
# similar) forwards public traffic to this VPS on port 80; this config
# proxies localhost:8088 (wikiwho-server) behind it.

log_format wikiwho_rs '$remote_addr - $http_x_forwarded_for [$time_local] '
                      '"$request" $status $body_bytes_sent '
                      'rt=$request_time uct=$upstream_connect_time '
                      'urt=$upstream_response_time';

server {
    listen 80 default_server;
    server_name _;

    add_header X-Frame-Options DENY always;
    add_header X-Content-Type-Options nosniff always;

    access_log /var/log/nginx/wikiwho-rs.access.log wikiwho_rs;
    error_log  /var/log/nginx/wikiwho-rs.error.log;

    # Cheap liveness probe for nginx + humans.
    location = /healthz {
        proxy_pass http://127.0.0.1:8088/healthz;
        proxy_read_timeout 5s;
        access_log off;
    }

    # Everything else: the WikiWho HTTP API.
    location / {
        proxy_pass http://127.0.0.1:8088;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        # Cache-miss path can take seconds for cold large articles.
        proxy_read_timeout 360s;
        proxy_connect_timeout 10s;
    }
}
